name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Prepare Assets
        run: |
          mkdir -p www
          cp index.html www/
          echo '{"appId":"com.rakusoft.slowlauncher","appName":"Slow Launcher","webDir":"www"}' > capacitor.config.json

      - name: Build Android Project & Inject Bridge
        run: |
          npx cap add android
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />' $MANIFEST
          sed -i '/<application/i <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<application/i <uses-permission android:name="android.permission.READ_CALENDAR" />' $MANIFEST
          sed -i '/<application/i <uses-permission android:name="android.permission.VIBRATE" />' $MANIFEST
          sed -i '/<category android:name="android.intent.category.LAUNCHER" \/>/a <category android:name="android.intent.category.HOME" />\n<category android:name="android.intent.category.DEFAULT" />' $MANIFEST
          
          cat <<EOF > android/app/src/main/java/com/rakusoft/slowlauncher/MainActivity.java
          package com.rakusoft.slowlauncher;
          import android.content.ContentResolver;
          import android.content.ContentUris;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.ResolveInfo;
          import android.database.Cursor;
          import android.graphics.Bitmap;
          import android.graphics.Canvas;
          import android.graphics.Color;
          import android.graphics.drawable.Drawable;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Vibrator;
          import android.os.VibrationEffect;
          import android.os.Build;
          import android.provider.CalendarContract;
          import android.provider.Settings;
          import android.util.Base64;
          import android.view.Window;
          import android.view.WindowManager;
          import android.webkit.JavascriptInterface;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;
          import org.json.JSONArray;
          import org.json.JSONObject;
          import java.io.ByteArrayOutputStream;
          import java.util.List;
          import java.util.Collections;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  Window w = getWindow();
                  w.setFlags(WindowManager.LayoutParams.FLAG_LAYOUT_NO_LIMITS, WindowManager.LayoutParams.FLAG_LAYOUT_NO_LIMITS);
                  w.setStatusBarColor(Color.TRANSPARENT);
                  w.setNavigationBarColor(Color.TRANSPARENT);

                  WebView webView = this.getBridge().getWebView();
                  webView.getSettings().setJavaScriptEnabled(true);
                  webView.setBackgroundColor(Color.TRANSPARENT);
                  
                  final Vibrator vibrator = (Vibrator) getSystemService(Context.VIBRATOR_SERVICE);

                  webView.addJavascriptInterface(new Object() {
                      @JavascriptInterface
                      public void hapticTick() {
                          if (vibrator != null && vibrator.hasVibrator()) {
                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                                  vibrator.vibrate(VibrationEffect.createOneShot(15, VibrationEffect.DEFAULT_AMPLITUDE));
                              } else {
                                  vibrator.vibrate(15);
                              }
                          }
                      }

                      @JavascriptInterface
                      public void fetchApps() {
                          try {
                              Intent mainIntent = new Intent(Intent.ACTION_MAIN, null);
                              mainIntent.addCategory(Intent.CATEGORY_LAUNCHER);
                              List<ResolveInfo> pkgAppsList = getPackageManager().queryIntentActivities(mainIntent, 0);
                              Collections.sort(pkgAppsList, (a, b) -> a.loadLabel(getPackageManager()).toString().compareToIgnoreCase(b.loadLabel(getPackageManager()).toString()));
                              JSONArray apps = new JSONArray();
                              for (ResolveInfo ad : pkgAppsList) {
                                  JSONObject app = new JSONObject();
                                  app.put("name", ad.loadLabel(getPackageManager()).toString());
                                  app.put("packageName", ad.activityInfo.packageName);
                                  Drawable icon = ad.loadIcon(getPackageManager());
                                  Bitmap bitmap = Bitmap.createBitmap(icon.getIntrinsicWidth(), icon.getIntrinsicHeight(), Bitmap.Config.ARGB_8888);
                                  Canvas canvas = new Canvas(bitmap);
                                  icon.setBounds(0, 0, canvas.getWidth(), canvas.getHeight());
                                  icon.draw(canvas);
                                  ByteArrayOutputStream stream = new ByteArrayOutputStream();
                                  bitmap.compress(Bitmap.CompressFormat.PNG, 100, stream);
                                  app.put("icon", Base64.encodeToString(stream.toByteArray(), Base64.NO_WRAP));
                                  apps.put(app);
                              }
                              final String json = apps.toString();
                              runOnUiThread(() -> webView.evaluateJavascript("setApps('" + json.replace("'", "\\\\'") + "')", null));
                          } catch (Exception e) {}
                      }

                      @JavascriptInterface
                      public void openAppInfo(String packageName) {
                          Intent intent = new Intent(Settings.ACTION_APPLICATION_DETAILS_SETTINGS);
                          intent.setData(Uri.parse("package:" + packageName));
                          startActivity(intent);
                      }

                      @JavascriptInterface
                      public void fetchCalendar() {
                          try {
                              long now = System.currentTimeMillis();
                              long later = now + (7L * 24 * 60 * 60 * 1000);
                              Uri.Builder builder = CalendarContract.Instances.CONTENT_URI.buildUpon();
                              ContentUris.appendId(builder, now);
                              ContentUris.appendId(builder, later);
                              String[] proj = new String[]{CalendarContract.Instances.TITLE, CalendarContract.Instances.BEGIN, CalendarContract.Instances.ALL_DAY};
                              Cursor cursor = getContentResolver().query(builder.build(), proj, null, null, CalendarContract.Instances.BEGIN + " ASC");
                              JSONArray events = new JSONArray();
                              if (cursor != null) {
                                  while (cursor.moveToNext()) {
                                      JSONObject ev = new JSONObject();
                                      ev.put("title", cursor.getString(0));
                                      ev.put("start", cursor.getLong(1));
                                      ev.put("allDay", cursor.getInt(2) == 1);
                                      events.put(ev);
                                  }
                                  cursor.close();
                              }
                              final String json = events.toString();
                              runOnUiThread(() -> webView.evaluateJavascript("setCalendar('" + json.replace("'", "\\\\'") + "')", null));
                          } catch (Exception e) {}
                      }

                      @JavascriptInterface
                      public void launchApp(String packageName) {
                          Intent intent = getPackageManager().getLaunchIntentForPackage(packageName);
                          if (intent != null) startActivity(intent);
                      }
                  }, "AndroidBridge");
              }
          }
          EOF

          npx cap sync android
          yes | sdkmanager --licenses || echo "OK"
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: slow-launcher-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
