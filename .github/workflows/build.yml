name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: |
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Prepare Web Assets & Config
        run: |
          # Ordner erstellen
          mkdir -p www
          cp index.html www/
          
          # Konfiguration direkt erstellen (erzwingt die appId)
          echo '{
            "appId": "com.rakusoft.slowlauncher",
            "appName": "Slow Launcher",
            "webDir": "www",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

      - name: Build App
        run: |
          # Initialisieren und Android-Ordner bauen
          npx cap add android
          npx cap sync android
          
          # Lizenzen akzeptieren
          yes | sdkmanager --licenses || echo "Lizenzen okay"
          
          # Kompilieren der APK
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: slow-launcher-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
