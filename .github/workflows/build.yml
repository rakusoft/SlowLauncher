name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Capacitor
        run: npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Prepare Assets & Bridge
        run: |
          mkdir -p www
          cp index.html www/
          echo '{"appId":"com.rakusoft.slowlauncher","appName":"Slow Launcher","webDir":"www"}' > capacitor.config.json

      - name: Build Android Project
        run: |
          npx cap add android
          
          # Launcher-Berechtigung in AndroidManifest.xml einfügen
          SED_QUERY='/<category android:name="android.intent.category.LAUNCHER" \/>/a <category android:name="android.intent.category.HOME" />\n<category android:name="android.intent.category.DEFAULT" />'
          sed -i "$SED_QUERY" android/app/src/main/AndroidManifest.xml
          
          npx cap sync android
          
          # APK bauen
          yes | sdkmanager --licenses || echo "OK"
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: slow-launcher-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
