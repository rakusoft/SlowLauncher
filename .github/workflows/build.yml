name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Prepare Assets
        run: |
          mkdir -p www
          cp index.html www/
          echo '{"appId":"com.rakusoft.slowlauncher","appName":"Slow Launcher","webDir":"www"}' > capacitor.config.json

      - name: Build Android Project & Inject Bridge
        run: |
          npx cap add android
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />' $MANIFEST
          sed -i '/<application/i <uses-permission android:name="android.permission.READ_CALENDAR" />' $MANIFEST
          sed -i '/<application/i <uses-permission android:name="android.permission.VIBRATE" />' $MANIFEST
          sed -i '/<application/i <uses-permission android:name="com.android.launcher.permission.INSTALL_SHORTCUT" />' $MANIFEST
          sed -i '/<category android:name="android.intent.category.LAUNCHER" \/>/a <category android:name="android.intent.category.HOME" />\n<category android:name="android.intent.category.DEFAULT" />' $MANIFEST
          
          # Shortcut Receiver in Manifest einbauen
          sed -i '/<\/activity>/a <receiver android:name=".MainActivity$ShortcutReceiver" android:permission="com.android.launcher.permission.INSTALL_SHORTCUT" android:exported="true"><intent-filter><action android:name="com.android.launcher.action.INSTALL_SHORTCUT" /></intent-filter></receiver>' $MANIFEST

          cat <<EOF > android/app/src/main/java/com/rakusoft/slowlauncher/MainActivity.java
          package com.rakusoft.slowlauncher;
          import android.content.ContentUris;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.ResolveInfo;
          import android.database.Cursor;
          import android.graphics.Bitmap;
          import android.graphics.Canvas;
          import android.graphics.Color;
          import android.graphics.drawable.Drawable;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Vibrator;
          import android.os.VibrationEffect;
          import android.os.Build;
          import android.provider.CalendarContract;
          import android.provider.Settings;
          import android.util.Base64;
          import android.view.Window;
          import android.view.WindowManager;
          import android.webkit.JavascriptInterface;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;
          import org.json.JSONArray;
          import org.json.JSONObject;
          import java.io.ByteArrayOutputStream;
          import java.util.List;
          import java.util.Collections;

          public class MainActivity extends BridgeActivity {
              private WebView webView;

              public static class ShortcutReceiver extends android.content.BroadcastReceiver {
                  @Override
                  public void onReceive(Context context, Intent intent) {
                      if ("com.android.launcher.action.INSTALL_SHORTCUT".equals(intent.getAction())) {
                          String name = intent.getStringExtra(Intent.EXTRA_SHORTCUT_NAME);
                          Intent target = intent.getParcelableExtra(Intent.EXTRA_SHORTCUT_INTENT);
                          if (name != null && target != null) {
                              android.content.SharedPreferences p = context.getSharedPreferences("Shortcuts", Context.MODE_PRIVATE);
                              try {
                                  JSONArray a = new JSONArray(p.getString("list", "[]"));
                                  JSONObject o = new JSONObject();
                                  o.put("name", name);
                                  o.put("uri", target.toUri(0));
                                  a.put(o);
                                  p.edit().putString("list", a.toString()).apply();
                              } catch (Exception e) {}
                          }
                      }
                  }
              }

              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  Window w = getWindow();
                  w.setFlags(WindowManager.LayoutParams.FLAG_LAYOUT_NO_LIMITS, WindowManager.LayoutParams.FLAG_LAYOUT_NO_LIMITS);
                  webView = this.getBridge().getWebView();
                  webView.getSettings().setJavaScriptEnabled(true);
                  webView.setBackgroundColor(Color.TRANSPARENT);
                  final Vibrator vib = (Vibrator) getSystemService(Context.VIBRATOR_SERVICE);

                  webView.addJavascriptInterface(new Object() {
                      @JavascriptInterface
                      public void hapticTick() {
                          if (vib != null && vib.hasVibrator()) {
                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                                  vib.vibrate(VibrationEffect.createOneShot(15, VibrationEffect.DEFAULT_AMPLITUDE));
                              } else { vib.vibrate(15); }
                          }
                      }

                      @JavascriptInterface
                      public void fetchApps() {
                          try {
                              Intent i = new Intent(Intent.ACTION_MAIN, null);
                              i.addCategory(Intent.CATEGORY_LAUNCHER);
                              List<ResolveInfo> l = getPackageManager().queryIntentActivities(i, 0);
                              Collections.sort(l, (a, b) -> a.loadLabel(getPackageManager()).toString().compareToIgnoreCase(b.loadLabel(getPackageManager()).toString()));
                              JSONArray apps = new JSONArray();
                              for (ResolveInfo ad : l) {
                                  JSONObject app = new JSONObject();
                                  app.put("name", ad.loadLabel(getPackageManager()).toString());
                                  app.put("packageName", ad.activityInfo.packageName);
                                  Drawable icon = ad.loadIcon(getPackageManager());
                                  Bitmap b = Bitmap.createBitmap(icon.getIntrinsicWidth(), icon.getIntrinsicHeight(), Bitmap.Config.ARGB_8888);
                                  icon.setBounds(0, 0, b.getWidth(), b.getHeight());
                                  icon.draw(new Canvas(b));
                                  ByteArrayOutputStream s = new ByteArrayOutputStream();
                                  b.compress(Bitmap.CompressFormat.PNG, 100, s);
                                  app.put("icon", Base64.encodeToString(s.toByteArray(), Base64.NO_WRAP));
                                  apps.put(app);
                              }
                              final String res = apps.toString();
                              runOnUiThread(() -> webView.evaluateJavascript("setApps('" + res.replace("'", "\\\\'") + "')", null));
                          } catch (Exception e) {}
                      }

                      @JavascriptInterface
                      public void fetchShortcuts() {
                          android.content.SharedPreferences p = getSharedPreferences("Shortcuts", Context.MODE_PRIVATE);
                          final String s = p.getString("list", "[]");
                          runOnUiThread(() -> webView.evaluateJavascript("setShortcuts('" + s.replace("'", "\\\\'") + "')", null));
                      }

                      @JavascriptInterface
                      public void launchShortcut(String uri) {
                          try {
                              Intent i = Intent.parseUri(uri, 0);
                              i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                              startActivity(i);
                          } catch (Exception e) {}
                      }

                      @JavascriptInterface
                      public void clearShortcuts() {
                          getSharedPreferences("Shortcuts", Context.MODE_PRIVATE).edit().clear().apply();
                      }

                      @JavascriptInterface
                      public void openAppInfo(String p) {
                          Intent i = new Intent(Settings.ACTION_APPLICATION_DETAILS_SETTINGS);
                          i.setData(Uri.parse("package:" + p));
                          startActivity(i);
                      }

                      @JavascriptInterface
                      public void fetchCalendar() {
                          try {
                              long n = System.currentTimeMillis();
                              Uri.Builder b = CalendarContract.Instances.CONTENT_URI.buildUpon();
                              ContentUris.appendId(b, n);
                              ContentUris.appendId(b, n + (7L * 24 * 60 * 60 * 1000));
                              Cursor cur = getContentResolver().query(b.build(), new String[]{"title", "begin", "allDay"}, null, null, "begin ASC");
                              JSONArray evs = new JSONArray();
                              while (cur != null && cur.moveToNext()) {
                                  JSONObject e = new JSONObject();
                                  e.put("title", cur.getString(0)); e.put("start", cur.getLong(1)); e.put("allDay", cur.getInt(2)==1);
                                  evs.put(e);
                              }
                              if(cur != null) cur.close();
                              final String res = evs.toString();
                              runOnUiThread(() -> webView.evaluateJavascript("setCalendar('" + res.replace("'", "\\\\'") + "')", null));
                          } catch (Exception e) {}
                      }

                      @JavascriptInterface
                      public void launchApp(String p) {
                          Intent i = getPackageManager().getLaunchIntentForPackage(p);
                          if (i != null) startActivity(i);
                      }
                  }, "AndroidBridge");
              }
          }
          EOF

          npx cap sync android
          yes | sdkmanager --licenses || echo "OK"
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: slow-launcher-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
