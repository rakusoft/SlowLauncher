<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { 
            --text-main: rgba(255,255,255,0.95);
            --text-sec: rgba(255,255,255,0.4);
            --nav-text: rgba(255,255,255,0.12);
            --accent: #007AFF;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background-color: #000; background-size: cover; background-position: center;
            background-attachment: fixed; color: var(--text-main); font-family: sans-serif;
            margin: 0; padding: calc(env(safe-area-inset-top) + 30px) 70px 300px 25px;
            min-height: 100vh; overflow-x: hidden; user-select: none;
        }
        /* Overlay ist weg - Pure Brillanz */
        #top-zone { margin-bottom: 15px; z-index: 100; position: relative; }
        .clock { font-size: 54px; font-weight: 200; margin-bottom: 0px; cursor: pointer; }
        .date { font-size: 13px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 20px; cursor: pointer; }
        #appSearch {
            width: 100%; background: rgba(255,255,255,0.15); border: none;
            border-radius: 10px; padding: 10px 15px; color: #fff; font-size: 16px;
            backdrop-filter: blur(12px); margin-bottom: 20px;
        }
        .app-list { list-style: none; padding: 0; margin: 0; position: relative; z-index: 10; }
        .app-item { padding: 9px 0; font-size: 17px; font-weight: 300; display: flex; align-items: center; gap: 12px; }
        .app-icon { width: 26px; height: 26px; border-radius: 6px; filter: grayscale(100%); opacity: 0.8; }
        .shortcut-icon { font-size: 18px; width: 26px; text-align: center; opacity: 0.9; }
        .header { color: var(--text-sec); font-size: 11px; margin-top: 30px; font-weight: bold; text-transform: uppercase; scroll-margin-top: 100px; }
        #nav-zone { position: fixed; right: 0; top: 20vh; width: 60px; height: 75vh; z-index: 1000; display: flex; flex-direction: column; justify-content: center; touch-action: none; }
        .nav-letter { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--nav-text); font-weight: bold; transition: transform 0.08s ease-out; }
        .show-only-favs .all-apps-item, .show-only-favs .letter-header { display: none; }
        .is-searching #nav-zone, .is-searching .fav-item, .is-searching .letter-header, .is-searching .shortcut-item { display: none; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; display: none; flex-direction: column; padding: 60px 25px; overflow-y: auto; }
        .btn { background: #222; color: #fff; border: 1px solid #333; padding: 14px; border-radius: 10px; font-size: 14px; margin-bottom: 10px; width: 100%; text-align: center; }
        textarea { background: #111; color: #aaa; border: 1px solid #333; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; height: 80px; margin-bottom: 10px; resize: none; user-select: all; word-break: break-all; }
        .fav-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #1a1a1a; }
        .fav-row.active span { color: #fff; }
        .event-item { margin-bottom: 15px; border-left: 2px solid var(--accent); padding-left: 10px; }
    </style>
</head>
<body class="show-only-favs" id="mainBody">
    <div id="top-zone">
        <div class="clock" id="clock" onclick="resetToFavs()">00:00</div>
        <div class="date" id="date" onclick="openCalendar()">Lade...</div>
        <input type="text" id="appSearch" placeholder="Suchen..." oninput="handleSearch(this.value)">
    </div>
    <div id="nav-zone"></div>
    <ul class="app-list" id="appList"></ul>

    <div id="settings-modal" class="modal">
        <h2 style="font-weight: 200;">Optionen</h2>
        <button class="btn" onclick="document.getElementById('bgInput').click()">Hintergrund ändern</button>
        <button class="btn" onclick="if(confirm('Verknüpfungen wirklich leeren?')) { AndroidBridge.clearShortcuts(); location.reload(); }">Shortcuts leeren</button>
        <textarea id="backupArea" placeholder="Backup-Code..."></textarea>
        <div style="display: flex; gap: 10px;">
            <button class="btn" style="flex:1" onclick="exportSettings()">Export</button>
            <button class="btn" style="flex:1; background: var(--accent);" onclick="importSettings()">Import</button>
        </div>
        <div id="fav-list-container"></div>
        <button class="btn" onclick="closeSettings()" style="background:#444; margin-top:20px;">Schließen</button>
        <input type="file" id="bgInput" style="display:none" accept="image/*" onchange="saveBg(this)">
    </div>

    <div id="calendar-modal" class="modal">
        <h2 style="font-weight: 200;">Termine</h2>
        <div id="calendar-content"></div>
        <button class="btn" onclick="closeCalendar()" style="margin-top:20px;">Schließen</button>
    </div>

    <script>
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const navZone = document.getElementById('nav-zone');
        const body = document.getElementById('mainBody');
        const searchInput = document.getElementById('appSearch');
        let allAppsGlobal = [];
        let myFavorites = JSON.parse(localStorage.getItem('myFavorites')) || ["Telefon"];
        let myShortcuts = [];

        const savedBg = localStorage.getItem('customBg');
        if (savedBg) document.body.style.backgroundImage = `url(${savedBg})`;

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('date').innerText = now.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateTime, 1000); updateTime();

        chars.forEach(c => {
            const s = document.createElement('div'); s.className = 'nav-letter'; s.innerText = c;
            navZone.appendChild(s);
        });

        window.setShortcuts = function(j) { 
            myShortcuts = JSON.parse(j); 
            renderList(allAppsGlobal); 
        };

        function renderList(apps, filter = false) {
            const l = document.getElementById('appList'); l.innerHTML = '';
            if (!filter) {
                // 1. Favoriten
                apps.filter(a => myFavorites.includes(a.name)).forEach(a => l.appendChild(createItem(a, "fav-item")));
                
                // 2. Verknüpfungen (MP3, Chrome etc.)
                if (myShortcuts.length > 0) {
                    const h = document.createElement('li'); h.className = 'header fav-item'; h.innerText = "Shortcuts";
                    l.appendChild(h);
                    myShortcuts.forEach((s, index) => {
                        const li = document.createElement('li'); li.className = 'app-item fav-item shortcut-item';
                        const isMp3 = s.name.toLowerCase().endsWith('.mp3');
                        li.innerHTML = `<span class="shortcut-icon">${isMp3 ? '🎵' : '🔗'}</span> <span>${s.name}</span>`;
                        li.onclick = () => AndroidBridge.launchShortcut(s.uri);
                        l.appendChild(li);
                    });
                }

                // 3. Optionen
                const opt = document.createElement('li'); opt.className = 'app-item fav-item'; opt.style.color = 'var(--text-sec)';
                opt.innerHTML = `<span style="font-size:20px;width:26px;text-align:center;">⚙</span> <span style="font-size:15px;">Optionen</span>`;
                opt.onclick = openSettings; l.appendChild(opt);
            }
            let last = '';
            apps.forEach(a => {
                const f = a.name[0].toUpperCase();
                if (!filter && f !== last && /^[A-Z]$/.test(f)) {
                    const h = document.createElement('li'); h.className = 'header letter-header'; h.id = 'header-'+f; h.innerText = f;
                    l.appendChild(h); last = f;
                }
                l.appendChild(createItem(a, "all-apps-item"));
            });
        }

        function createItem(app, cls) {
            const li = document.createElement('li'); li.className = 'app-item ' + cls;
            li.innerHTML = `<img class="app-icon" src="data:image/png;base64,${app.icon}"> <span>${app.name}</span>`;
            let timer;
            li.ontouchstart = () => { timer = setTimeout(() => { if(window.AndroidBridge) AndroidBridge.openAppInfo(app.packageName); }, 1200); };
            li.ontouchend = () => { clearTimeout(timer); };
            li.ontouchmove = () => { clearTimeout(timer); };
            li.onclick = () => { AndroidBridge.launchApp(app.packageName); setTimeout(resetToFavs, 1000); };
            return li;
        }

        window.setApps = function(j) { allAppsGlobal = JSON.parse(j); AndroidBridge.fetchShortcuts(); };

        function handleSearch(q) {
            if (q.trim() === "") { body.classList.remove('is-searching'); resetToFavs(); return; }
            body.classList.add('is-searching'); body.classList.remove('show-only-favs');
            renderList(allAppsGlobal.filter(a => a.name.toLowerCase().includes(q.toLowerCase())), true);
        }
        function resetToFavs() { searchInput.value = ""; body.classList.remove('is-searching'); body.classList.add('show-only-favs'); window.scrollTo(0, 0); renderList(allAppsGlobal); }

        // Settings & Navigation (unverändert)
        function exportSettings() {
            const b64 = btoa(encodeURIComponent(JSON.stringify(myFavorites)).replace(/%([0-9A-F]{2})/g, (m, p) => String.fromCharCode('0x' + p)));
            document.getElementById('backupArea').value = b64; alert("Exportiert!");
        }
        function importSettings() {
            try {
                const dec = decodeURIComponent(Array.prototype.map.call(atob(document.getElementById('backupArea').value.trim().replace(/\s/g, '')), (c) => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                myFavorites = JSON.parse(dec); localStorage.setItem('myFavorites', JSON.stringify(myFavorites));
                renderList(allAppsGlobal); alert("Importiert!"); closeSettings();
            } catch(e) { alert("Fehler!"); }
        }
        function saveBg(input) {
            const r = new FileReader(); r.onloadend = function() {
                const img = new Image(); img.onload = function() {
                    const cv = document.createElement('canvas'); const ctx = cv.getContext('2d');
                    const mW = 800; const sc = mW / img.width; cv.width = mW; cv.height = img.height * sc;
                    ctx.drawImage(img, 0, 0, cv.width, cv.height);
                    localStorage.setItem('customBg', cv.toDataURL('image/jpeg', 0.6));
                    document.body.style.backgroundImage = `url(${localStorage.getItem('customBg')})`;
                };
                img.src = r.result;
            };
            r.readAsDataURL(input.files[0]);
        }
        function openSettings() { 
            const c = document.getElementById('fav-list-container'); c.innerHTML = '<h4 style="font-weight:300;margin-top:20px;color:var(--text-sec); font-size:12px;">Favoriten wählen</h4>';
            allAppsGlobal.forEach(a => {
                const is = myFavorites.includes(a.name); const r = document.createElement('div');
                r.className = `fav-row ${is?'active':''}`; r.onclick = () => {
                    myFavorites = myFavorites.includes(a.name) ? myFavorites.filter(f => f !== a.name) : [...myFavorites, a.name];
                    localStorage.setItem('myFavorites', JSON.stringify(myFavorites)); openSettings(); renderList(allAppsGlobal);
                };
                r.innerHTML = `<span style="font-size:14px;">${a.name}</span><div style="color:var(--accent)">${is?'✓':''}</div>`;
                c.appendChild(r);
            });
            document.getElementById('settings-modal').style.display = 'flex'; 
        }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        function openCalendar() { if (window.AndroidBridge) AndroidBridge.fetchCalendar(); document.getElementById('calendar-modal').style.display = 'flex'; }
        function closeCalendar() { document.getElementById('calendar-modal').style.display = 'none'; }
        window.setCalendar = function(j) {
            const evs = JSON.parse(j); const c = document.getElementById('calendar-content');
            c.innerHTML = evs.length === 0 ? '<p>Keine Termine.</p>' : '';
            evs.forEach(e => {
                const d = new Date(e.start); const div = document.createElement('div'); div.className = 'event-item';
                div.innerHTML = `<div style="color:var(--text-sec); font-size:11px;">${d.toLocaleDateString('de-DE', {weekday:'short'})} • ${e.allDay?'Ganztägig':d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div><div>${e.title}</div>`;
                c.appendChild(div);
            });
        };
        function applyWave(tX, tY) {
            const ls = document.querySelectorAll('.nav-letter');
            const hF = Math.max(0.3, Math.min(1.0, (window.innerWidth - tX) / 120)); 
            ls.forEach(l => {
                const r = l.getBoundingClientRect(); const cY = r.top + r.height / 2; const dY = Math.abs(tY - cY);
                if (dY < 120) {
                    const fY = 1 - (dY / 120); const eY = fY * fY * (3 - 2 * fY); 
                    l.style.transform = `scale(${1 + 1.8 * eY * hF}) translateX(${-130 * eY * hF}px)`;
                    l.style.color = `rgba(255,255,255,${0.2 + 0.8 * eY * hF})`;
                } else { l.style.transform = 'scale(1) translateX(0px)'; l.style.color = 'var(--nav-text)'; }
            });
        }
        function handleScrub(e) {
            if (document.querySelector('.modal[style*="display: flex"]') || body.classList.contains('is-searching')) return;
            e.preventDefault(); body.classList.remove('show-only-favs');
            const t = e.touches[0]; applyWave(t.clientX, t.clientY);
            const b = navZone.getBoundingClientRect();
            let rY = Math.max(0, Math.min(0.99, (t.clientY - b.top) / b.height));
            const target = document.getElementById('header-' + chars[Math.floor(rY * chars.length)]);
            if (target) window.scrollTo(0, target.offsetTop - 100);
        }
        navZone.addEventListener('touchstart', handleScrub);
        navZone.addEventListener('touchmove', handleScrub);
        navZone.addEventListener('touchend', () => { document.querySelectorAll('.nav-letter').forEach(l => { l.style.transform = 'scale(1) translateX(0px)'; l.style.color = 'var(--nav-text)'; }); });
        
        setTimeout(() => { if (window.AndroidBridge) { AndroidBridge.fetchApps(); AndroidBridge.fetchCalendar(); } }, 300);
    </script>
</body>
</html>
