<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { 
            /* Hintergrund-Bild URL hier eintragen */
            --bg-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop');
            
            --text-main: rgba(255,255,255,0.95);
            --text-sec: rgba(255,255,255,0.4);
            --nav-text: rgba(255,255,255,0.15);
            --wave-range: 150px; 
            --wave-scale: 3.2;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background-color: #000;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            font-family: sans-serif;
            margin: 0;
            padding: 90px 80px 300px 30px;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); 
            z-index: -1;
        }

        .clock { font-size: 68px; font-weight: 200; margin-bottom: 5px; }
        .date { font-size: 16px; color: var(--text-sec); margin-bottom: 50px; text-transform: uppercase; letter-spacing: 1.5px; }
        
        .app-list { list-style: none; padding: 0; margin: 0; position: relative; z-index: 10; }
        .app-item { padding: 16px 0; font-size: 23px; font-weight: 300; display: flex; align-items: center; gap: 20px; }
        .app-icon { width: 34px; height: 34px; border-radius: 10px; filter: grayscale(100%); opacity: 0.8; }

        .header { color: var(--text-sec); font-size: 14px; margin-top: 45px; font-weight: bold; text-transform: uppercase; scroll-margin-top: 100px; }
        
        #nav-zone {
            position: fixed; right: 0; top: 0; width: 80px; height: 100vh;
            z-index: 1000; display: flex; flex-direction: column; justify-content: center;
            touch-action: none; padding: 40px 0;
        }

        .nav-letter {
            flex: 1; display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: var(--nav-text); font-weight: bold;
            transition: transform 0.08s ease-out, color 0.1s;
            will-change: transform;
        }

        /* Nur Favoriten anzeigen */
        .show-only-favs .all-apps-item, 
        .show-only-favs .letter-header { display: none; }
    </style>
</head>
<body class="show-only-favs" id="mainBody">
    
    <div onclick="resetToFavs()">
        <div class="clock" id="clock">00:00</div>
        <div class="date" id="date">Lade...</div>
    </div>
    
    <div id="nav-zone"></div>
    <ul class="app-list" id="appList"></ul>

    <script>
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const navZone = document.getElementById('nav-zone');
        const body = document.getElementById('mainBody');
        
        const myFavorites = ["Telefon", "WhatsApp", "Chrome", "Karten", "Einstellungen", "Galerie"];

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').innerText = now.toLocaleDateString('de-DE', options);
        }
        setInterval(updateTime, 1000); updateTime();

        chars.forEach(c => {
            const s = document.createElement('div');
            s.className = 'nav-letter'; s.innerText = c;
            navZone.appendChild(s);
        });

        // Zurück zur Favoriten-Ansicht
        function resetToFavs() {
            body.classList.add('show-only-favs');
            window.scrollTo(0, 0);
        }

        function applyWave(touchY) {
            const letters = document.querySelectorAll('.nav-letter');
            letters.forEach(letter => {
                const rect = letter.getBoundingClientRect();
                const centerY = rect.top + rect.height / 2;
                const dist = Math.abs(touchY - centerY);
                if (dist < 150) {
                    const factor = 1 - (dist / 150);
                    const eased = factor * factor * (3 - 2 * factor); 
                    letter.style.transform = `scale(${1 + 2.2 * eased}) translateX(${-90 * eased}px)`;
                    letter.style.color = `rgba(255,255,255,${0.2 + 0.8 * eased})`;
                } else {
                    letter.style.transform = `scale(1) translateX(0px)`;
                    letter.style.color = `var(--nav-text)`;
                }
            });
        }

        function handleScrub(e) {
            e.preventDefault();
            const touch = e.touches[0];
            body.classList.remove('show-only-favs'); // Drawer öffnen
            applyWave(touch.clientY);
            
            const bounds = navZone.getBoundingClientRect();
            let relY = (touch.clientY - bounds.top) / bounds.height;
            relY = Math.max(0, Math.min(0.99, relY));
            const letter = chars[Math.floor(relY * chars.length)];
            const target = document.getElementById('header-' + letter);
            if (target) window.scrollTo(0, target.offsetTop - 100);
        }

        navZone.addEventListener('touchstart', handleScrub);
        navZone.addEventListener('touchmove', handleScrub);
        navZone.addEventListener('touchend', () => {
            // Welle optisch zurücksetzen, aber Liste offen lassen!
            document.querySelectorAll('.nav-letter').forEach(l => {
                l.style.transform = `scale(1) translateX(0px)`;
                l.style.color = `var(--nav-text)`;
            });
        });

        window.setApps = function(json) {
            const apps = JSON.parse(json);
            const list = document.getElementById('appList');
            list.innerHTML = '';
            
            // Favoriten
            apps.filter(a => myFavorites.includes(a.name)).forEach(app => {
                list.appendChild(createItem(app, "fav-item"));
            });

            // Rest der Liste
            let last = '';
            apps.forEach(app => {
                const first = app.name[0].toUpperCase();
                if (first !== last && /^[A-Z]$/.test(first)) {
                    const h = document.createElement('li'); h.className = 'header letter-header'; h.id = 'header-' + first; h.innerText = first;
                    list.appendChild(h); last = first;
                }
                list.appendChild(createItem(app, "all-apps-item"));
            });
        };

        function createItem(app, cls) {
            const li = document.createElement('li');
            li.className = 'app-item ' + cls;
            li.innerHTML = `<img class="app-icon" src="data:image/png;base64,${app.icon}"> <span>${app.name}</span>`;
            li.onclick = () => {
                AndroidBridge.launchApp(app.packageName);
                setTimeout(resetToFavs, 1000); // Wenn man zurückkommt, sind wieder Favoriten da
            };
            return li;
        }

        setTimeout(() => { if (window.AndroidBridge) AndroidBridge.fetchApps(); }, 400);
    </script>
</body>
</html>
