<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --bg-color: #000; --text-color: #fff; }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            margin: 0;
            padding: 60px 40px 20px 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            user-select: none;
        }
        .clock { font-size: 54px; font-weight: 200; margin-bottom: 30px; }
        .app-list { list-style: none; padding: 0; margin: 0; }
        .app-item { padding: 18px 5px; font-size: 20px; font-weight: 300; border-radius: 10px; }
        .app-item:active { background: #222; }
        .letter-header { color: #444; font-size: 14px; margin-top: 25px; padding-left: 5px; font-weight: bold; }

        .alphabet-nav {
            position: fixed; right: 5px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; height: 85vh;
            font-size: 11px; color: #555; width: 30px; z-index: 100;
        }
        .alphabet-nav span { flex: 1; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="clock" id="clock">00:00</div>
    <div class="alphabet-nav" id="alphabetNav"></div>
    <ul class="app-list" id="appList"><li>Lade Apps...</li></ul>

    <script>
        // 1. Uhrzeit
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }, 1000);

        // 2. Alphabet Navigation
        const nav = document.getElementById('alphabetNav');
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(let => {
            const span = document.createElement('span');
            span.innerText = let;
            span.onclick = () => {
                const target = document.getElementById('letter-' + let);
                if (target) window.scrollTo({ top: target.offsetTop - 60, behavior: 'smooth' });
            };
            nav.appendChild(span);
        });

        // 3. Echte Apps vom System empfangen
        window.setApps = function(jsonString) {
            const apps = JSON.parse(jsonString);
            const list = document.getElementById('appList');
            list.innerHTML = '';
            let lastLetter = '';

            apps.sort((a, b) => a.name.localeCompare(b.name)).forEach(app => {
                const firstLetter = app.name[0].toUpperCase();
                if (firstLetter !== lastLetter && /^[A-Z]$/.test(firstLetter)) {
                    const header = document.createElement('li');
                    header.className = 'letter-header';
                    header.id = 'letter-' + firstLetter;
                    header.innerText = firstLetter;
                    list.appendChild(header);
                    lastLetter = firstLetter;
                }
                const li = document.createElement('li');
                li.className = 'app-item';
                li.innerText = app.name;
                li.onclick = () => AndroidBridge.launchApp(app.packageName);
                list.appendChild(li);
            });
        };

        // Warte kurz, bis die Brücke bereit ist
        setTimeout(() => {
            if (window.AndroidBridge) {
                AndroidBridge.fetchApps();
            }
        }, 500);
    </script>
</body>
</html>
