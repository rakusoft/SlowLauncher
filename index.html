<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { 
            --text-main: rgba(255,255,255,0.95);
            --text-sec: rgba(255,255,255,0.4);
            --nav-text: rgba(255,255,255,0.12);
            --accent: #007AFF;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background-color: #000; background-size: cover; background-position: center;
            background-attachment: fixed; color: var(--text-main); font-family: sans-serif;
            margin: 0; padding: calc(env(safe-area-inset-top) + 30px) 80px 300px 30px;
            min-height: 100vh; overflow-x: hidden; user-select: none;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: -1;
        }

        #top-zone { margin-bottom: 15px; z-index: 100; position: relative; }
        .clock { font-size: 60px; font-weight: 200; margin-bottom: 2px; cursor: pointer; }
        .date { font-size: 14px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 20px; cursor: pointer; }
        
        #appSearch {
            width: 100%; background: rgba(255,255,255,0.1); border: none;
            border-radius: 10px; padding: 10px 15px; color: #fff; font-size: 16px;
            backdrop-filter: blur(10px); margin-bottom: 20px;
        }

        .app-list { list-style: none; padding: 0; margin: 0; position: relative; z-index: 10; }
        .app-item { padding: 12px 0; font-size: 19px; font-weight: 300; display: flex; align-items: center; gap: 15px; }
        .app-icon { width: 28px; height: 28px; border-radius: 8px; filter: grayscale(100%); opacity: 0.7; }

        .header { color: var(--text-sec); font-size: 12px; margin-top: 35px; font-weight: bold; text-transform: uppercase; scroll-margin-top: 120px; }
        
        #nav-zone { position: fixed; right: 0; top: 25vh; width: 80px; height: 70vh; z-index: 1000; display: flex; flex-direction: column; justify-content: center; touch-action: none; }
        #reset-gap { position: fixed; right: 0; top: 0; width: 80px; height: 25vh; z-index: 1001; }
        .nav-letter { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--nav-text); font-weight: bold; }

        .show-only-favs .all-apps-item, .show-only-favs .letter-header { display: none; }
        .is-searching #nav-zone, .is-searching .fav-item, .is-searching .letter-header { display: none; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; display: none; flex-direction: column; padding: 60px 25px; overflow-y: auto; }
        .btn { background: #333; color: #fff; border: none; padding: 16px; border-radius: 12px; font-size: 15px; margin-bottom: 12px; width: 100%; text-align: center; }
        
        .fav-row { display: flex; align-items: center; justify-content: space-between; padding: 15px 10px; border-bottom: 1px solid #222; }
        .fav-row.active span { color: #fff; font-weight: bold; }
        .event-item { margin-bottom: 20px; border-left: 3px solid var(--accent); padding-left: 12px; }
    </style>
</head>
<body class="show-only-favs" id="mainBody">
    <div id="reset-gap" onclick="resetToFavs()"></div>
    <div id="top-zone">
        <div class="clock" id="clock" onclick="resetToFavs()">00:00</div>
        <div class="date" id="date" onclick="openCalendar()">Lade...</div>
        <input type="text" id="appSearch" placeholder="Suche..." oninput="handleSearch(this.value)">
    </div>
    <div id="nav-zone"></div>
    <ul class="app-list" id="appList"></ul>

    <div id="calendar-modal" class="modal">
        <h2 style="font-weight: 200;">Woche</h2>
        <div id="calendar-content"></div>
        <button class="btn" onclick="closeCalendar()" style="background:#555; margin-top:20px;">Schließen</button>
    </div>

    <div id="settings-modal" class="modal">
        <h2 style="font-weight: 200;">Optionen</h2>
        <button class="btn" onclick="document.getElementById('bgInput').click()">Bild ändern</button>
        <button class="btn" onclick="exportSettings()">Backup: Code kopieren</button>
        <button class="btn" onclick="importSettings()">Restore: Code einfügen</button>
        <button class="btn" onclick="clearBg()">Bild löschen</button>
        <div id="fav-list-container"></div>
        <button class="btn" onclick="closeSettings()" style="background:var(--accent); margin-top:20px;">Fertig</button>
        <input type="file" id="bgInput" style="display:none" accept="image/*" onchange="saveBg(this)">
    </div>

    <script>
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const navZone = document.getElementById('nav-zone');
        const body = document.getElementById('mainBody');
        const searchInput = document.getElementById('appSearch');
        let allAppsGlobal = [];
        let myFavorites = JSON.parse(localStorage.getItem('myFavorites')) || ["Telefon", "WhatsApp"];

        const savedBg = localStorage.getItem('customBg');
        if (savedBg) document.body.style.backgroundImage = `url(${savedBg})`;

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('date').innerText = now.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateTime, 1000); updateTime();

        chars.forEach(c => {
            const s = document.createElement('div'); s.className = 'nav-letter'; s.innerText = c;
            navZone.appendChild(s);
        });

        // Backup & Restore
        function exportSettings() {
            const data = { favs: myFavorites, bg: localStorage.getItem('customBg') };
            const code = btoa(JSON.stringify(data));
            prompt("Kopiere diesen Code zur Sicherung:", code);
        }

        function importSettings() {
            const code = prompt("Füge deinen Sicherungs-Code hier ein:");
            if (code) {
                try {
                    const data = JSON.parse(atob(code));
                    myFavorites = data.favs;
                    localStorage.setItem('myFavorites', JSON.stringify(myFavorites));
                    if (data.bg) {
                        localStorage.setItem('customBg', data.bg);
                        document.body.style.backgroundImage = `url(${data.bg})`;
                    }
                    renderList(allAppsGlobal);
                    alert("Wiederherstellung erfolgreich!");
                } catch(e) { alert("Fehler beim Import!"); }
            }
        }

        function handleSearch(q) {
            if (q.trim() === "") { body.classList.remove('is-searching'); resetToFavs(); return; }
            body.classList.add('is-searching'); body.classList.remove('show-only-favs');
            renderList(allAppsGlobal.filter(a => a.name.toLowerCase().includes(q.toLowerCase())), true);
        }

        function resetToFavs() {
            searchInput.value = ""; body.classList.remove('is-searching'); body.classList.add('show-only-favs');
            window.scrollTo(0, 0); renderList(allAppsGlobal);
        }

        function openCalendar() { if (window.AndroidBridge) AndroidBridge.fetchCalendar(); document.getElementById('calendar-modal').style.display = 'flex'; }
        function closeCalendar() { document.getElementById('calendar-modal').style.display = 'none'; }
        window.setCalendar = function(j) {
            const evs = JSON.parse(j); const c = document.getElementById('calendar-content');
            c.innerHTML = evs.length === 0 ? '<p>Keine Termine.</p>' : '';
            evs.forEach(e => {
                const d = new Date(e.start); const div = document.createElement('div'); div.className = 'event-item';
                div.innerHTML = `<div class="event-time">${d.toLocaleDateString('de-DE', {weekday:'short', day:'numeric'})} • ${e.allDay?'Ganztägig':d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</div><div>${e.title}</div>`;
                c.appendChild(div);
            });
        };

        function renderList(apps, filter = false) {
            const l = document.getElementById('appList'); l.innerHTML = '';
            if (!filter) {
                apps.filter(a => myFavorites.includes(a.name)).forEach(a => l.appendChild(createItem(a, "fav-item")));
                const s = document.createElement('li'); s.className = 'app-item fav-item'; s.style.color = 'var(--text-sec)';
                s.innerHTML = `<span style="font-size:24px;width:28px;text-align:center;">⚙</span> <span>Einstellungen</span>`;
                s.onclick = openSettings; l.appendChild(s);
            }
            let last = '';
            apps.forEach(a => {
                const f = a.name[0].toUpperCase();
                if (!filter && f !== last && /^[A-Z]$/.test(f)) {
                    const h = document.createElement('li'); h.className = 'header letter-header'; h.id = 'header-'+f; h.innerText = f;
                    l.appendChild(h); last = f;
                }
                l.appendChild(createItem(a, "all-apps-item"));
            });
        }

        function createItem(app, cls) {
            const li = document.createElement('li'); li.className = 'app-item ' + cls;
            li.innerHTML = `<img class="app-icon" src="data:image/png;base64,${app.icon}"> <span>${app.name}</span>`;
            li.onclick = () => { AndroidBridge.launchApp(app.packageName); setTimeout(resetToFavs, 1000); };
            // Langes Drücken für App-Info
            li.oncontextmenu = (e) => { e.preventDefault(); if(window.AndroidBridge) AndroidBridge.openAppInfo(app.packageName); };
            return li;
        }

        window.setApps = function(j) { allAppsGlobal = JSON.parse(j); renderList(allAppsGlobal); };

        function toggleFav(n) {
            myFavorites = myFavorites.includes(n) ? myFavorites.filter(f => f !== n) : [...myFavorites, n];
            localStorage.setItem('myFavorites', JSON.stringify(myFavorites));
            renderSettingsList(); renderList(allAppsGlobal);
        }
        function renderSettingsList() {
            const c = document.getElementById('fav-list-container'); c.innerHTML = '<h3 style="font-weight:300;margin-top:20px;color:var(--text-sec);">Favoriten</h3>';
            allAppsGlobal.forEach(a => {
                const is = myFavorites.includes(a.name); const r = document.createElement('div');
                r.className = `fav-row ${is?'active':''}`; r.onclick = () => toggleFav(a.name);
                r.innerHTML = `<span>${a.name}</span><div style="color:var(--accent)">${is?'✓':''}</div>`;
                c.appendChild(r);
            });
        }
        function openSettings() { renderSettingsList(); document.getElementById('settings-modal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }

        function saveBg(input) {
            const r = new FileReader(); r.onloadend = function() {
                const img = new Image(); img.onload = function() {
                    const cv = document.createElement('canvas'); const ctx = cv.getContext('2d');
                    const mW = 800; const sc = mW / img.width; cv.width = mW; cv.height = img.height * sc;
                    ctx.drawImage(img, 0, 0, cv.width, cv.height);
                    const b64 = cv.toDataURL('image/jpeg', 0.6);
                    localStorage.setItem('customBg', b64); document.body.style.backgroundImage = `url(${b64})`;
                };
                img.src = r.result;
            };
            r.readAsDataURL(input.files[0]);
        }
        function clearBg() { localStorage.removeItem('customBg'); document.body.style.backgroundImage = 'none'; }

        function applyWave(tX, tY) {
            const ls = document.querySelectorAll('.nav-letter');
            const hF = Math.max(0.3, Math.min(1.0, (window.innerWidth - tX) / 150)); 
            ls.forEach(l => {
                const r = l.getBoundingClientRect(); const cY = r.top + r.height / 2; const dY = Math.abs(tY - cY);
                if (dY < 150) {
                    const fY = 1 - (dY / 150); const eY = fY * fY * (3 - 2 * fY); 
                    l.style.transform = `scale(${1 + 2.0 * eY * hF}) translateX(${-80 * eY * hF}px)`;
                    l.style.color = `rgba(255,255,255,${0.2 + 0.8 * eY * hF})`;
                } else { l.style.transform = 'scale(1) translateX(0px)'; l.style.color = 'var(--nav-text)'; }
            });
        }

        function handleScrub(e) {
            if (document.querySelector('.modal[style*="display: flex"]') || body.classList.contains('is-searching')) return;
            e.preventDefault(); body.classList.remove('show-only-favs');
            const t = e.touches[0]; applyWave(t.clientX, t.clientY);
            const b = navZone.getBoundingClientRect();
            let rY = Math.max(0, Math.min(0.99, (t.clientY - b.top) / b.height));
            const target = document.getElementById('header-' + chars[Math.floor(rY * chars.length)]);
            if (target) window.scrollTo(0, target.offsetTop - 120);
        }
        navZone.addEventListener('touchstart', handleScrub);
        navZone.addEventListener('touchmove', handleScrub);
        navZone.addEventListener('touchend', () => {
            document.querySelectorAll('.nav-letter').forEach(l => { l.style.transform = 'scale(1) translateX(0px)'; l.style.color = 'var(--nav-text)'; });
        });

        setTimeout(() => { if (window.AndroidBridge) { AndroidBridge.fetchApps(); AndroidBridge.fetchCalendar(); } }, 400);
    </script>
</body>
</html>
