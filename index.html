<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --bg-color: #000; --text-color: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        body {
            padding: 60px 50px 20px 20px;
        }

        .clock { font-size: 54px; font-weight: 200; margin-bottom: 30px; }
        .app-list { list-style: none; padding: 0; margin: 0; }
        .app-item { padding: 18px 5px; font-size: 20px; font-weight: 300; }
        .letter-header { 
            color: #444; font-size: 14px; margin-top: 30px; 
            font-weight: bold; scroll-margin-top: 80px; 
        }

        /* Alphabet-Leiste optimiert für "Gleiten" */
        .alphabet-nav {
            position: fixed;
            right: 0; top: 0;
            width: 60px; height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 999;
            touch-action: none; /* Verhindert normales Scrollen beim Gleiten */
        }

        .alphabet-nav span {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #666;
            pointer-events: none; /* Berührungen gehen ans Elternelement */
        }
    </style>
</head>
<body>

    <div class="clock" id="clock">00:00</div>
    <div class="alphabet-nav" id="alphabetNav"></div>
    <ul class="app-list" id="appList"></ul>

    <script>
        // Uhrzeit
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = 
                now.getHours().toString().padStart(2, '0') + ":" + 
                now.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Alphabet-Leiste erstellen
        const nav = document.getElementById('alphabetNav');
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        chars.forEach(let => {
            const span = document.createElement('span');
            span.innerText = let;
            span.setAttribute('data-letter', let);
            nav.appendChild(span);
        });

        // Gleit-Logik (Niagara Style)
        function handleTouch(e) {
            const touch = e.touches[0];
            const element = document.elementFromPoint(touch.clientX, touch.clientY);
            if (element && element.getAttribute('data-letter')) {
                const letter = element.getAttribute('data-letter');
                const target = document.getElementById('letter-' + letter);
                if (target) target.scrollIntoView({ block: 'start' });
            }
        }

        nav.addEventListener('touchstart', handleTouch);
        nav.addEventListener('touchmove', handleTouch);

        // Apps rendern
        window.setApps = function(jsonString) {
            const apps = JSON.parse(jsonString);
            const list = document.getElementById('appList');
            list.innerHTML = '';
            let lastLetter = '';

            apps.sort((a, b) => a.name.localeCompare(b.name)).forEach(app => {
                const firstLetter = app.name[0].toUpperCase();
                if (firstLetter !== lastLetter && /^[A-Z]$/.test(firstLetter)) {
                    const header = document.createElement('li');
                    header.className = 'letter-header';
                    header.id = 'letter-' + firstLetter;
                    header.innerText = firstLetter;
                    list.appendChild(header);
                    lastLetter = firstLetter;
                }
                const li = document.createElement('li');
                li.className = 'app-item';
                li.innerText = app.name;
                li.onclick = () => AndroidBridge.launchApp(app.packageName);
                list.appendChild(li);
            });
        };

        setTimeout(() => { if (window.AndroidBridge) AndroidBridge.fetchApps(); }, 300);
    </script>
</body>
</html>
