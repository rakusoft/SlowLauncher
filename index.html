<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { 
            --text-main: rgba(255,255,255,0.95);
            --text-sec: rgba(255,255,255,0.4);
            --nav-text: rgba(255,255,255,0.15);
            --wave-range: 150px; 
            --wave-scale: 3.2;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background-color: #000;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            font-family: sans-serif;
            margin: 0;
            padding: 20px 80px 300px 30px;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        /* Abdunklung für das Hintergrundbild */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); 
            z-index: -1;
        }

        #top-zone { padding-top: 60px; margin-bottom: 30px; }
        .clock { font-size: 68px; font-weight: 200; margin-bottom: 5px; }
        .date { font-size: 16px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1.5px; }
        
        .app-list { list-style: none; padding: 0; margin: 0; position: relative; z-index: 10; }
        .app-item { padding: 16px 0; font-size: 23px; font-weight: 300; display: flex; align-items: center; gap: 20px; }
        .app-icon { width: 34px; height: 34px; border-radius: 10px; filter: grayscale(100%); opacity: 0.8; }

        .header { color: var(--text-sec); font-size: 14px; margin-top: 45px; font-weight: bold; text-transform: uppercase; scroll-margin-top: 100px; }
        
        /* Navigation & Reset-Lücke */
        #nav-zone { position: fixed; right: 0; top: 25vh; width: 80px; height: 70vh; z-index: 1000; display: flex; flex-direction: column; justify-content: center; touch-action: none; padding-bottom: 40px; }
        #reset-gap { position: fixed; right: 0; top: 0; width: 80px; height: 25vh; z-index: 1001; }

        .nav-letter { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--nav-text); font-weight: bold; transition: transform 0.08s ease-out, color 0.1s; will-change: transform; }

        .show-only-favs .all-apps-item, .show-only-favs .letter-header { display: none; }

        /* Einstellungen Overlay */
        #settings-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000;
            display: none; flex-direction: column; padding: 50px 30px;
        }
        .btn { background: #333; color: #fff; border: none; padding: 20px; border-radius: 15px; font-size: 18px; margin-bottom: 20px; }
    </style>
</head>
<body class="show-only-favs" id="mainBody">
    
    <div id="reset-gap" onclick="resetToFavs()"></div>

    <div id="top-zone" onclick="resetToFavs()">
        <div class="clock" id="clock">00:00</div>
        <div class="date" id="date">Lade...</div>
    </div>
    
    <div id="nav-zone"></div>
    <ul class="app-list" id="appList"></ul>

    <div id="settings-modal">
        <h2 style="font-weight: 200; margin-bottom: 40px;">Einstellungen</h2>
        <button class="btn" onclick="document.getElementById('bgInput').click()">Hintergrund aus Galerie wählen</button>
        <button class="btn" onclick="clearBg()">Hintergrund zurücksetzen (Schwarz)</button>
        <button class="btn" onclick="closeSettings()" style="background: #555; margin-top: auto;">Schließen</button>
        <input type="file" id="bgInput" style="display:none" accept="image/*" onchange="saveBg(this)">
    </div>

    <script>
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const navZone = document.getElementById('nav-zone');
        const body = document.getElementById('mainBody');
        
        // --- FAVORITEN ---
        const myFavorites = ["Telefon", "WhatsApp", "Chrome", "Karten", "Einstellungen", "Galerie"];

        // Hintergrund beim Start laden
        const savedBg = localStorage.getItem('customBg');
        if (savedBg) document.body.style.backgroundImage = `url(${savedBg})`;

        function saveBg(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                // Wir verkleinern das Bild etwas, damit der Speicher nicht überläuft
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxW = 1080; 
                    const scale = maxW / img.width;
                    canvas.width = maxW;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.7);
                    localStorage.setItem('customBg', base64);
                    document.body.style.backgroundImage = `url(${base64})`;
                    closeSettings();
                };
                img.src = reader.result;
            }
            reader.readAsDataURL(file);
        }

        function clearBg() {
            localStorage.removeItem('customBg');
            document.body.style.backgroundImage = 'none';
            closeSettings();
        }

        function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').innerText = now.toLocaleDateString('de-DE', options);
        }
        setInterval(updateTime, 1000); updateTime();

        chars.forEach(c => {
            const s = document.createElement('div');
            s.className = 'nav-letter'; s.innerText = c;
            navZone.appendChild(s);
        });

        function resetToFavs() {
            body.classList.add('show-only-favs');
            window.scrollTo(0, 0);
        }

        function applyWave(touchY) {
            const letters = document.querySelectorAll('.nav-letter');
            letters.forEach(letter => {
                const rect = letter.getBoundingClientRect();
                const centerY = rect.top + rect.height / 2;
                const dist = Math.abs(touchY - centerY);
                if (dist < 150) {
                    const factor = 1 - (dist / 150);
                    const eased = factor * factor * (3 - 2 * factor); 
                    letter.style.transform = `scale(${1 + 2.2 * eased}) translateX(${-90 * eased}px)`;
                    letter.style.color = `rgba(255,255,255,${0.2 + 0.8 * eased})`;
                } else {
                    letter.style.transform = `scale(1) translateX(0px)`;
                    letter.style.color = `var(--nav-text)`;
                }
            });
        }

        function handleScrub(e) {
            e.preventDefault();
            const touch = e.touches[0];
            body.classList.remove('show-only-favs');
            applyWave(touch.clientY);
            const bounds = navZone.getBoundingClientRect();
            let relY = (touch.clientY - bounds.top) / bounds.height;
            relY = Math.max(0, Math.min(0.99, relY));
            const letter = chars[Math.floor(relY * chars.length)];
            const target = document.getElementById('header-' + letter);
            if (target) window.scrollTo(0, target.offsetTop - 100);
        }

        navZone.addEventListener('touchstart', handleScrub);
        navZone.addEventListener('touchmove', handleScrub);
        navZone.addEventListener('touchend', () => {
            document.querySelectorAll('.nav-letter').forEach(l => {
                l.style.transform = `scale(1) translateX(0px)`;
                l.style.color = `var(--nav-text)`;
            });
        });

        window.setApps = function(json) {
            const apps = JSON.parse(json);
            const list = document.getElementById('appList');
            list.innerHTML = '';
            
            // Favoriten
            apps.filter(a => myFavorites.includes(a.name)).forEach(app => {
                list.appendChild(createItem(app, "fav-item"));
            });

            // Spezieller Button für Einstellungen am Ende der Favoriten
            const setBtn = document.createElement('li');
            setBtn.className = 'app-item fav-item';
            setBtn.style.color = 'var(--text-sec)';
            setBtn.innerHTML = `<span style="font-size: 30px; width: 34px; text-align: center;">⚙</span> <span>Launcher-Einstellungen</span>`;
            setBtn.onclick = openSettings;
            list.appendChild(setBtn);

            // Gesamte Liste
            let last = '';
            apps.forEach(app => {
                const first = app.name[0].toUpperCase();
                if (first !== last && /^[A-Z]$/.test(first)) {
                    const h = document.createElement('li'); h.className = 'header letter-header'; h.id = 'header-' + first; h.innerText = first;
                    list.appendChild(h); last = first;
                }
                list.appendChild(createItem(app, "all-apps-item"));
            });
        };

        function createItem(app, cls) {
            const li = document.createElement('li');
            li.className = 'app-item ' + cls;
            li.innerHTML = `<img class="app-icon" src="data:image/png;base64,${app.icon}"> <span>${app.name}</span>`;
            li.onclick = () => {
                AndroidBridge.launchApp(app.packageName);
                setTimeout(resetToFavs, 1000);
            };
            return li;
        }

        setTimeout(() => { if (window.AndroidBridge) AndroidBridge.fetchApps(); }, 400);
    </script>
</body>
</html>
