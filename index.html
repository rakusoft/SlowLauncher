<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Slow Launcher</title>
    <style>
        :root { --bg-color: #000; --text-color: #fff; --accent-color: #444; }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            margin: 0;
            padding: 60px 25px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .clock { font-size: 54px; font-weight: 200; }
        .app-list { list-style: none; padding: 20px 0; margin: 0; }
        .app-item { padding: 15px 5px; font-size: 20px; font-weight: 300; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <div class="clock" id="clock">00:00</div>
    <ul class="app-list" id="appList">
        <li class="app-item">Telefon</li>
        <li class="app-item">WhatsApp</li>
        <li class="app-item">Browser</li>
        <li class="app-item">Einstellungen</li>
    </ul>
    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = 
                now.getHours().toString().padStart(2, '0') + ":" + 
                now.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
