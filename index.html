<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --bg-color: #000; --text-color: #fff; --accent: #333; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            margin: 0;
            padding: 80px 60px 20px 30px;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        .clock { font-size: 58px; font-weight: 200; margin-bottom: 40px; }
        
        /* App Liste */
        .app-list { list-style: none; padding: 0; margin: 0; }
        .app-item { 
            padding: 15px 0; 
            font-size: 22px; 
            font-weight: 300; 
            display: flex;
            align-items: center;
        }
        .app-item:active { color: #888; }

        .letter-header { 
            color: #555; font-size: 14px; margin-top: 35px; 
            font-weight: bold; scroll-margin-top: 100px; 
        }

        /* Das Alphabet rechts (Die Steuerzentrale) */
        #nav-zone {
            position: fixed;
            right: 0; top: 0;
            width: 70px; height: 100vh;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            touch-action: none;
        }

        .nav-letter {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #444;
            pointer-events: none;
        }

        /* Das große Overlay-Zeichen beim Scrollen */
        #letter-overlay {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            color: rgba(255,255,255,0.2);
            display: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="clock" id="clock">00:00</div>
    <div id="letter-overlay"></div>
    <div id="nav-zone"></div>
    <ul class="app-list" id="appList"></ul>

    <script>
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const navZone = document.getElementById('nav-zone');
        const overlay = document.getElementById('letter-overlay');
        let allApps = [];
        
        // --- HIER DEINE FAVORITEN EINTRAGEN (Paketnamen) ---
        const favorites = ["com.android.chrome", "com.whatsapp", "com.android.settings", "com.android.dialer"];

        // 1. Uhrzeit
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Alphabet aufbauen
        chars.forEach(c => {
            const s = document.createElement('div');
            s.className = 'nav-letter';
            s.innerText = c;
            navZone.appendChild(s);
        });

        // 3. Navigation & Drawer Logik
        function scrubAlphabet(e) {
            const touch = e.touches[0];
            const bounds = navZone.getBoundingClientRect();
            let relY = (touch.clientY - bounds.top) / bounds.height;
            relY = Math.max(0, Math.min(0.99, relY));
            
            const index = Math.floor(relY * chars.length);
            const letter = chars[index];

            // Visuelles Feedback
            overlay.innerText = letter;
            overlay.style.display = 'block';

            // Zeige ALLE Apps, wenn das Alphabet berührt wird (Drawer Modus)
            renderList(allApps, true);

            // Springe zum Buchstaben
            const target = document.getElementById('letter-' + letter);
            if (target) {
                window.scrollTo(0, target.offsetTop - 90);
            }
        }

        navZone.addEventListener('touchstart', (e) => { e.preventDefault(); scrubAlphabet(e); });
        navZone.addEventListener('touchmove', (e) => { e.preventDefault(); scrubAlphabet(e); });
        navZone.addEventListener('touchend', () => { 
            setTimeout(() => { overlay.style.display = 'none'; }, 500);
        });

        // 4. Liste rendern
        function renderList(apps, showAll = false) {
            const list = document.getElementById('appList');
            list.innerHTML = '';
            let currentApps = showAll ? apps : apps.filter(a => favorites.includes(a.packageName));
            
            // Falls keine Favoriten definiert sind oder wir im Drawer sind
            if (!showAll && currentApps.length === 0) currentApps = apps.slice(0, 6);

            let lastLetter = '';
            currentApps.sort((a, b) => a.name.localeCompare(b.name)).forEach(app => {
                const firstLetter = app.name[0].toUpperCase();
                
                if (showAll && firstLetter !== lastLetter && /^[A-Z]$/.test(firstLetter)) {
                    const header = document.createElement('li');
                    header.className = 'letter-header';
                    header.id = 'letter-' + firstLetter;
                    header.innerText = firstLetter;
                    list.appendChild(header);
                    lastLetter = firstLetter;
                }

                const li = document.createElement('li');
                li.className = 'app-item';
                li.innerText = app.name;
                li.onclick = () => AndroidBridge.launchApp(app.packageName);
                list.appendChild(li);
            });
        }

        // 5. Daten vom Handy empfangen
        window.setApps = function(jsonString) {
            allApps = JSON.parse(jsonString);
            renderList(allApps, false); // Zuerst nur Favoriten zeigen
        };

        setTimeout(() => { if (window.AndroidBridge) AndroidBridge.fetchApps(); }, 300);
    </script>
</body>
</html>
