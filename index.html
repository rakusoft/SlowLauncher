<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { 
            --text-main: rgba(255,255,255,0.95);
            --text-sec: rgba(255,255,255,0.4);
            --nav-text: rgba(255,255,255,0.15);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background-color: transparent; background-size: cover; background-position: center;
            background-attachment: fixed; color: var(--text-main); font-family: sans-serif;
            margin: 0; padding: calc(env(safe-area-inset-top) + 60px) 80px 300px 30px;
            min-height: 100vh; overflow-x: hidden; user-select: none;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: -1;
        }

        #top-zone { margin-bottom: 30px; cursor: pointer; }
        .clock { font-size: 68px; font-weight: 200; margin-bottom: 5px; }
        .date { font-size: 16px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1.5px; }
        
        .app-list { list-style: none; padding: 0; margin: 0; position: relative; z-index: 10; }
        .app-item { padding: 16px 0; font-size: 23px; font-weight: 300; display: flex; align-items: center; gap: 20px; }
        .app-icon { width: 34px; height: 34px; border-radius: 10px; filter: grayscale(100%); opacity: 0.8; }

        .header { color: var(--text-sec); font-size: 14px; margin-top: 45px; font-weight: bold; text-transform: uppercase; scroll-margin-top: 100px; }
        
        #nav-zone { position: fixed; right: 0; top: 25vh; width: 80px; height: 75vh; z-index: 1000; display: flex; flex-direction: column; justify-content: center; touch-action: none; padding-bottom: calc(env(safe-area-inset-bottom) + 20px); }
        #reset-gap { position: fixed; right: 0; top: 0; width: 80px; height: 25vh; z-index: 1001; }

        .nav-letter { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--nav-text); font-weight: bold; transition: transform 0.08s ease-out, color 0.1s; will-change: transform; }

        .show-only-favs .all-apps-item, .show-only-favs .letter-header { display: none; }

        /* Overlays (Einstellungen & Kalender) */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 2000;
            display: none; flex-direction: column; padding: 80px 30px;
            overflow-y: auto;
        }
        .btn { background: #333; color: #fff; border: none; padding: 18px; border-radius: 15px; font-size: 16px; margin-bottom: 15px; width: 100%; text-align: center; }
        
        .fav-row { display: flex; align-items: center; justify-content: space-between; padding: 18px 10px; border-bottom: 1px solid #222; }
        .fav-row.active span { color: #fff; font-weight: bold; }
        .fav-row.inactive span { color: #555; }

        /* Kalender Design */
        .event-item { margin-bottom: 25px; border-left: 3px solid #007AFF; padding-left: 15px; }
        .event-time { font-size: 13px; color: var(--text-sec); margin-bottom: 4px; }
        .event-title { font-size: 18px; font-weight: 300; }
    </style>
</head>
<body class="show-only-favs" id="mainBody">
    
    <div id="reset-gap" onclick="resetToFavs()"></div>

    <div id="top-zone" onclick="openCalendar()">
        <div class="clock" id="clock">00:00</div>
        <div class="date" id="date">Lade...</div>
    </div>
    
    <div id="nav-zone"></div>
    <ul class="app-list" id="appList"></ul>

    <div id="calendar-modal" class="modal">
        <h2 style="font-weight: 200; margin-bottom: 30px;">Wochenübersicht</h2>
        <div id="calendar-content"></div>
        <button class="btn" onclick="closeCalendar()" style="background: #555; margin-top: 30px;">Schließen</button>
    </div>

    <div id="settings-modal" class="modal">
        <h2 style="font-weight: 200; margin-bottom: 20px;">Optionen</h2>
        <button class="btn" onclick="document.getElementById('bgInput').click()">Hintergrundbild ändern</button>
        <button class="btn" onclick="clearBg()">Hintergrund zurücksetzen</button>
        <div id="fav-list-container"></div>
        <button class="btn" onclick="closeSettings()" style="background: #007AFF; margin-top: 30px;">Fertig</button>
        <input type="file" id="bgInput" style="display:none" accept="image/*" onchange="saveBg(this)">
    </div>

    <script>
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const navZone = document.getElementById('nav-zone');
        const body = document.getElementById('mainBody');
        let allAppsGlobal = [];
        let myFavorites = JSON.parse(localStorage.getItem('myFavorites')) || ["Telefon", "WhatsApp"];

        const savedBg = localStorage.getItem('customBg');
        if (savedBg) document.body.style.backgroundImage = `url(${savedBg})`;

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').innerText = now.toLocaleDateString('de-DE', options);
        }
        setInterval(updateTime, 1000); updateTime();

        chars.forEach(c => {
            const s = document.createElement('div');
            s.className = 'nav-letter'; s.innerText = c;
            navZone.appendChild(s);
        });

        function resetToFavs() { body.classList.add('show-only-favs'); window.scrollTo(0, 0); }

        // --- KALENDER LOGIK ---
        function openCalendar() {
            if (window.AndroidBridge) AndroidBridge.fetchCalendar();
            document.getElementById('calendar-modal').style.display = 'flex';
        }
        function closeCalendar() { document.getElementById('calendar-modal').style.display = 'none'; }

        window.setCalendar = function(json) {
            const events = JSON.parse(json);
            const container = document.getElementById('calendar-content');
            container.innerHTML = events.length === 0 ? '<p style="color: #555;">Keine Termine in der nächsten Woche.</p>' : '';
            
            events.forEach(ev => {
                const date = new Date(ev.start);
                const timeStr = ev.allDay ? 'Ganztägig' : date.toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});
                const dayStr = date.toLocaleDateString('de-DE', {weekday: 'short', day: 'numeric', month: 'short'});
                
                const div = document.createElement('div');
                div.className = 'event-item';
                div.innerHTML = `<div class="event-time">${dayStr} • ${timeStr}</div><div class="event-title">${ev.title}</div>`;
                container.appendChild(div);
            });
        };

        // --- FAVORITEN & APPS ---
        function toggleFav(name) {
            myFavorites = myFavorites.includes(name) ? myFavorites.filter(f => f !== name) : [...myFavorites, name];
            localStorage.setItem('myFavorites', JSON.stringify(myFavorites));
            renderSettingsList(); renderMainList();
        }

        function renderSettingsList() {
            const container = document.getElementById('fav-list-container');
            container.innerHTML = '<h3 style="font-weight: 300; margin-top: 30px; color: var(--text-sec);">Favoriten wählen</h3>';
            allAppsGlobal.forEach(app => {
                const isFav = myFavorites.includes(app.name);
                const row = document.createElement('div');
                row.className = `fav-row ${isFav ? 'active' : 'inactive'}`;
                row.onclick = () => toggleFav(app.name);
                row.innerHTML = `<span>${app.name}</span><div>${isFav ? '✓' : ''}</div>`;
                container.appendChild(row);
            });
        }

        function openSettings() { renderSettingsList(); document.getElementById('settings-modal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }

        function renderMainList() {
            const list = document.getElementById('appList');
            list.innerHTML = '';
            allAppsGlobal.filter(a => myFavorites.includes(a.name)).forEach(app => list.appendChild(createItem(app, "fav-item")));
            const setBtn = document.createElement('li');
            setBtn.className = 'app-item fav-item';
            setBtn.innerHTML = `<span style="font-size: 30px; width: 34px; text-align: center;">⚙</span> <span>Launcher-Einstellungen</span>`;
            setBtn.onclick = openSettings;
            list.appendChild(setBtn);
            let last = '';
            allAppsGlobal.forEach(app => {
                const first = app.name[0].toUpperCase();
                if (first !== last && /^[A-Z]$/.test(first)) {
                    const h = document.createElement('li'); h.className = 'header letter-header'; h.id = 'header-' + first; h.innerText = first;
                    list.appendChild(h); last = first;
                }
                list.appendChild(createItem(app, "all-apps-item"));
            });
        }

        window.setApps = function(json) { allAppsGlobal = JSON.parse(json); renderMainList(); };

        function createItem(app, cls) {
            const li = document.createElement('li');
            li.className = 'app-item ' + cls;
            li.innerHTML = `<img class="app-icon" src="data:image/png;base64,${app.icon}"> <span>${app.name}</span>`;
            li.onclick = () => { AndroidBridge.launchApp(app.packageName); setTimeout(resetToFavs, 1000); };
            return li;
        }

        function saveBg(input) {
            const reader = new FileReader();
            reader.onloadend = function() {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxW = 1080; const scale = maxW / img.width;
                    canvas.width = maxW; canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.7);
                    localStorage.setItem('customBg', base64);
                    document.body.style.backgroundImage = `url(${base64})`;
                };
                img.src = reader.result;
            }
            reader.readAsDataURL(input.files[0]);
        }
        function clearBg() { localStorage.removeItem('customBg'); document.body.style.backgroundImage = 'none'; }

        function handleScrub(e) {
            if (document.querySelector('.modal[style*="display: flex"]')) return;
            e.preventDefault();
            body.classList.remove('show-only-favs');
            const touch = e.touches[0];
            const bounds = navZone.getBoundingClientRect();
            let relY = Math.max(0, Math.min(0.99, (touch.clientY - bounds.top) / bounds.height));
            const letter = chars[Math.floor(relY * chars.length)];
            const target = document.getElementById('header-' + letter);
            if (target) window.scrollTo(0, target.offsetTop - 120);
            
            // Welle
            document.querySelectorAll('.nav-letter').forEach(l => {
                const rect = l.getBoundingClientRect();
                const dist = Math.abs(touch.clientY - (rect.top + rect.height / 2));
                if (dist < 150) {
                    const eased = (1 - dist/150)**2 * (3 - 2*(1-dist/150));
                    l.style.transform = `scale(${1 + 2.2 * eased}) translateX(${-90 * eased}px)`;
                    l.style.color = `rgba(255,255,255,${0.2 + 0.8 * eased})`;
                } else {
                    l.style.transform = 'scale(1) translateX(0px)'; l.style.color = 'var(--nav-text)';
                }
            });
        }

        navZone.addEventListener('touchstart', handleScrub);
        navZone.addEventListener('touchmove', handleScrub);
        navZone.addEventListener('touchend', () => {
            document.querySelectorAll('.nav-letter').forEach(l => { l.style.transform = 'scale(1) translateX(0px)'; l.style.color = 'var(--nav-text)'; });
        });

        setTimeout(() => { if (window.AndroidBridge) { AndroidBridge.fetchApps(); AndroidBridge.fetchCalendar(); } }, 400);
    </script>
</body>
</html>
