<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { 
            --text-main: rgba(255,255,255,0.95);
            --text-sec: rgba(255,255,255,0.4);
            --nav-text: rgba(255,255,255,0.15);
            --accent: #007AFF;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background-color: #000;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            font-family: sans-serif;
            margin: 0;
            /* Safe Area Padding für Edge-to-Edge Design */
            padding: calc(env(safe-area-inset-top) + 40px) 80px 300px 30px;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        /* Dunkles Glas-Overlay für bessere Lesbarkeit */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: -1;
        }

        /* Top-Bereich (Uhr, Datum, Suche) */
        #top-zone { margin-bottom: 20px; z-index: 100; position: relative; }
        .clock { font-size: 68px; font-weight: 200; margin-bottom: 5px; cursor: pointer; }
        .date { font-size: 16px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 25px; cursor: pointer; }
        
        #search-container { margin-bottom: 30px; }
        #appSearch {
            width: 100%; background: rgba(255,255,255,0.1); border: none;
            border-radius: 12px; padding: 12px 15px; color: #fff; font-size: 18px;
            backdrop-filter: blur(10px);
        }
        #appSearch::placeholder { color: var(--text-sec); }

        /* App-Liste */
        .app-list { list-style: none; padding: 0; margin: 0; position: relative; z-index: 10; }
        .app-item { padding: 16px 0; font-size: 23px; font-weight: 300; display: flex; align-items: center; gap: 20px; }
        .app-icon { width: 34px; height: 34px; border-radius: 10px; filter: grayscale(100%); opacity: 0.8; }
        .app-item:active .app-icon { filter: grayscale(0%); opacity: 1; }

        .header { color: var(--text-sec); font-size: 14px; margin-top: 45px; font-weight: bold; text-transform: uppercase; scroll-margin-top: 120px; }
        
        /* Alphabet Navigation */
        #nav-zone { 
            position: fixed; right: 0; top: 25vh; width: 80px; height: 70vh; 
            z-index: 1000; display: flex; flex-direction: column; justify-content: center; 
            touch-action: none; padding-bottom: calc(env(safe-area-inset-bottom) + 20px); 
        }
        #reset-gap { position: fixed; right: 0; top: 0; width: 80px; height: 25vh; z-index: 1001; cursor: pointer; }

        .nav-letter { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            font-size: 10px; color: var(--nav-text); font-weight: bold; 
            transition: transform 0.08s ease-out, color 0.1s; will-change: transform; 
        }

        /* Sichtbarkeits-Logik */
        .show-only-favs .all-apps-item, .show-only-favs .letter-header { display: none; }
        .is-searching #nav-zone, .is-searching .fav-item, .is-searching .letter-header { display: none; }

        /* Modals (Kalender & Einstellungen) */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.97); z-index: 2000; 
            display: none; flex-direction: column; padding: 80px 30px; overflow-y: auto; 
        }
        .btn { background: #333; color: #fff; border: none; padding: 18px; border-radius: 15px; font-size: 16px; margin-bottom: 15px; width: 100%; text-align: center; }
        
        .fav-row { display: flex; align-items: center; justify-content: space-between; padding: 18px 10px; border-bottom: 1px solid #222; cursor: pointer; }
        .fav-row.active span { color: #fff; font-weight: bold; }
        .fav-row.inactive span { color: #555; }

        .event-item { margin-bottom: 25px; border-left: 3px solid var(--accent); padding-left: 15px; }
        .event-time { font-size: 13px; color: var(--text-sec); margin-bottom: 4px; }
    </style>
</head>
<body class="show-only-favs" id="mainBody">
    
    <div id="reset-gap" onclick="resetToFavs()"></div>

    <div id="top-zone">
        <div class="clock" id="clock" onclick="resetToFavs()">00:00</div>
        <div class="date" id="date" onclick="openCalendar()">Lade Datum...</div>
        
        <div id="search-container">
            <input type="text" id="appSearch" placeholder="App suchen..." oninput="handleSearch(this.value)">
        </div>
    </div>
    
    <div id="nav-zone"></div>
    <ul class="app-list" id="appList"></ul>

    <div id="calendar-modal" class="modal">
        <h2 style="font-weight: 200; margin-bottom: 30px;">Wochenübersicht</h2>
        <div id="calendar-content"></div>
        <button class="btn" onclick="closeCalendar()" style="background: #555; margin-top: 30px;">Schließen</button>
    </div>

    <div id="settings-modal" class="modal">
        <h2 style="font-weight: 200; margin-bottom: 20px;">Launcher-Optionen</h2>
        <button class="btn" onclick="document.getElementById('bgInput').click()">Hintergrund aus Galerie</button>
        <button class="btn" onclick="clearBg()">Hintergrund zurücksetzen</button>
        
        <h3 style="font-weight: 300; margin-top: 30px; color: var(--text-sec);">Favoriten wählen</h3>
        <div id="fav-list-container"></div>
        
        <button class="btn" onclick="closeSettings()" style="background: var(--accent); margin-top: 30px; font-weight: bold;">Fertig</button>
        <input type="file" id="bgInput" style="display:none" accept="image/*" onchange="saveBg(this)">
    </div>

    <script>
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const navZone = document.getElementById('nav-zone');
        const body = document.getElementById('mainBody');
        const searchInput = document.getElementById('appSearch');
        let allAppsGlobal = [];
        let touchStartX = 0;

        // Favoriten-Speicher
        let myFavorites = JSON.parse(localStorage.getItem('myFavorites')) || ["Telefon", "WhatsApp"];

        // Hintergrund-Speicher
        const savedBg = localStorage.getItem('customBg');
        if (savedBg) document.body.style.backgroundImage = `url(${savedBg})`;

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('date').innerText = now.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateTime, 1000); updateTime();

        chars.forEach(c => {
            const s = document.createElement('div');
            s.className = 'nav-letter'; s.innerText = c;
            navZone.appendChild(s);
        });

        // --- NAVIGATION & SUCHE ---
        function handleSearch(query) {
            if (query.trim() === "") {
                body.classList.remove('is-searching');
                resetToFavs();
                return;
            }
            body.classList.add('is-searching');
            body.classList.remove('show-only-favs');
            const filtered = allAppsGlobal.filter(app => app.name.toLowerCase().includes(query.toLowerCase()));
            renderList(filtered, true);
        }

        function resetToFavs() {
            searchInput.value = "";
            body.classList.remove('is-searching');
            body.classList.add('show-only-favs');
            window.scrollTo(0, 0);
            renderList(allAppsGlobal);
        }

        // Swipe-Geste zum Zurücksetzen (Links nach Rechts)
        document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
        document.addEventListener('touchend', e => {
            if (document.querySelector('.modal[style*="display: flex"]')) return;
            if (e.changedTouches[0].screenX - touchStartX > 150) resetToFavs();
        });

        // --- KALENDER ---
        function openCalendar() { if (window.AndroidBridge) AndroidBridge.fetchCalendar(); document.getElementById('calendar-modal').style.display = 'flex'; }
        function closeCalendar() { document.getElementById('calendar-modal').style.display = 'none'; }
        window.setCalendar = function(json) {
            const events = JSON.parse(json);
            const container = document.getElementById('calendar-content');
            container.innerHTML = events.length === 0 ? '<p style="color: #555;">Keine Termine.</p>' : '';
            events.forEach(ev => {
                const date = new Date(ev.start);
                const d = document.createElement('div'); d.className = 'event-item';
                d.innerHTML = `<div class="event-time">${date.toLocaleDateString('de-DE', {weekday: 'short', day: 'numeric'})} • ${ev.allDay ? 'Ganztägig' : date.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'})}</div><div>${ev.title}</div>`;
                container.appendChild(d);
            });
        };

        // --- APPS RENDERN ---
        function renderList(apps, isFiltered = false) {
            const list = document.getElementById('appList');
            list.innerHTML = '';
            
            if (!isFiltered) {
                apps.filter(a => myFavorites.includes(a.name)).forEach(app => list.appendChild(createItem(app, "fav-item")));
                const setBtn = document.createElement('li');
                setBtn.className = 'app-item fav-item';
                setBtn.innerHTML = `<span style="font-size: 30px; width: 34px; text-align: center;">⚙</span> <span>Launcher-Einstellungen</span>`;
                setBtn.onclick = openSettings;
                list.appendChild(setBtn);
            }

            let last = '';
            apps.forEach(app => {
                const first = app.name[0].toUpperCase();
                if (!isFiltered && first !== last && /^[A-Z]$/.test(first)) {
                    const h = document.createElement('li'); h.className = 'header letter-header'; h.id = 'header-' + first; h.innerText = first;
                    list.appendChild(h); last = first;
                }
                list.appendChild(createItem(app, "all-apps-item"));
            });
        }

        function createItem(app, cls) {
            const li = document.createElement('li');
            li.className = 'app-item ' + cls;
            li.innerHTML = `<img class="app-icon" src="data:image/png;base64,${app.icon}"> <span>${app.name}</span>`;
            li.onclick = () => { AndroidBridge.launchApp(app.packageName); setTimeout(resetToFavs, 1000); };
            return li;
        }

        window.setApps = function(json) { allAppsGlobal = JSON.parse(json); renderList(allAppsGlobal); };

        // --- EINSTELLUNGEN ---
        function toggleFav(name) {
            myFavorites = myFavorites.includes(name) ? myFavorites.filter(f => f !== name) : [...myFavorites, name];
            localStorage.setItem('myFavorites', JSON.stringify(myFavorites));
            renderSettingsList(); renderList(allAppsGlobal);
        }
        function renderSettingsList() {
            const container = document.getElementById('fav-list-container');
            container.innerHTML = '';
            allAppsGlobal.forEach(app => {
                const isFav = myFavorites.includes(app.name);
                const row = document.createElement('div');
                row.className = `fav-row ${isFav ? 'active' : 'inactive'}`;
                row.onclick = () => toggleFav(app.name);
                row.innerHTML = `<span>${app.name}</span><div style="color:var(--accent)">${isFav ? '✓' : ''}</div>`;
                container.appendChild(row);
            });
        }
        function openSettings() { renderSettingsList(); document.getElementById('settings-modal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }

        // Hintergrund-Logik
        function saveBg(input) {
            const reader = new FileReader();
            reader.onloadend = function() {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxW = 1080; const scale = maxW / img.width;
                    canvas.width = maxW; canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    localStorage.setItem('customBg', canvas.toDataURL('image/jpeg', 0.7));
                    document.body.style.backgroundImage = `url(${localStorage.getItem('customBg')})`;
                };
                img.src = reader.result;
            }
            reader.readAsDataURL(input.files[0]);
        }
        function clearBg() { localStorage.removeItem('customBg'); document.body.style.backgroundImage = 'none'; }

        // --- DIE DYNAMISCHE WELLE ---
        function applyWave(touchX, touchY) {
            const letters = document.querySelectorAll('.nav-letter');
            const distFromRight = window.innerWidth - touchX;
            const horizFactor = Math.max(0.3, Math.min(1.0, distFromRight / 150)); 

            letters.forEach(letter => {
                const rect = letter.getBoundingClientRect();
                const centerY = rect.top + rect.height / 2;
                const distY = Math.abs(touchY - centerY);
                if (distY < 150) {
                    const factorY = 1 - (distY / 150);
                    const easedY = factorY * factorY * (3 - 2 * factorY); 
                    const dynamicScale = 1 + (2.2 * easedY * horizFactor);
                    const dynamicX = -90 * easedY * horizFactor;
                    letter.style.transform = `scale(${dynamicScale}) translateX(${dynamicX}px)`;
                    letter.style.color = `rgba(255,255,255,${0.2 + 0.8 * easedY * horizFactor})`;
                } else {
                    letter.style.transform = 'scale(1) translateX(0px)';
                    letter.style.color = 'var(--nav-text)';
                }
            });
        }

        function handleScrub(e) {
            if (document.querySelector('.modal[style*="display: flex"]') || body.classList.contains('is-searching')) return;
            e.preventDefault();
            body.classList.remove('show-only-favs');
            const touch = e.touches[0];
            applyWave(touch.clientX, touch.clientY);
            const bounds = navZone.getBoundingClientRect();
            let relY = Math.max(0, Math.min(0.99, (touch.clientY - bounds.top) / bounds.height));
            const letter = chars[Math.floor(relY * chars.length)];
            const target = document.getElementById('header-' + letter);
            if (target) window.scrollTo(0, target.offsetTop - 120);
        }

        navZone.addEventListener('touchstart', handleScrub);
        navZone.addEventListener('touchmove', handleScrub);
        navZone.addEventListener('touchend', () => {
            document.querySelectorAll('.nav-letter').forEach(l => { 
                l.style.transform = 'scale(1) translateX(0px)'; 
                l.style.color = 'var(--nav-text)'; 
            });
        });

        setTimeout(() => { if (window.AndroidBridge) { AndroidBridge.fetchApps(); AndroidBridge.fetchCalendar(); } }, 400);
    </script>
</body>
</html>
