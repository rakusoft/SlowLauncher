<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root { --bg-color: #000; --text-color: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            margin: 0;
            padding: 60px 60px 20px 20px;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
            scroll-behavior: auto; /* Schnelleres Springen */
        }

        .clock { font-size: 54px; font-weight: 200; margin-bottom: 30px; }
        .app-list { list-style: none; padding: 0; margin: 0; }
        .app-item { padding: 18px 5px; font-size: 20px; font-weight: 300; }
        .letter-header { 
            color: #444; font-size: 14px; margin-top: 30px; 
            font-weight: bold; scroll-margin-top: 70px; 
        }

        /* Die aktive Touch-Zone rechts */
        #nav-zone {
            position: fixed;
            right: 0; top: 0;
            width: 80px; /* Schön breit für den Daumen */
            height: 100vh;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(255,255,255,0.01); /* Fast unsichtbar, aber fangbar */
            touch-action: none;
        }

        .nav-letter {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #555;
            pointer-events: none; /* Berührungen gehen direkt an die nav-zone */
        }
    </style>
</head>
<body>

    <div class="clock" id="clock">00:00</div>
    <div id="nav-zone"></div>
    <ul class="app-list" id="appList"></ul>

    <script>
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const navZone = document.getElementById('nav-zone');
        
        // 1. Uhrzeit
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = 
                now.getHours().toString().padStart(2, '0') + ":" + 
                now.getMinutes().toString().padStart(2, '0');
        }, 1000);

        // 2. Alphabet Leiste optisch aufbauen
        chars.forEach(c => {
            const s = document.createElement('div');
            s.className = 'nav-letter';
            s.innerText = c;
            navZone.appendChild(s);
        });

        // 3. Die Logik: Wo ist der Finger?
        function jumpToLetter(e) {
            const touch = e.touches[0];
            const bounds = navZone.getBoundingClientRect();
            
            // Relative Position im Alphabet berechnen (0 bis 1)
            let relY = (touch.clientY - bounds.top) / bounds.height;
            relY = Math.max(0, Math.min(0.99, relY)); // Begrenzen
            
            const index = Math.floor(relY * chars.length);
            const letter = chars[index];
            
            const target = document.getElementById('letter-' + letter);
            if (target) {
                // Sofortiger Sprung ohne "smooth", damit es direkt reagiert
                window.scrollTo(0, target.offsetTop - 70);
            }
        }

        navZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jumpToLetter(e);
        });

        navZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            jumpToLetter(e);
        });

        // 4. Apps vom System empfangen
        window.setApps = function(jsonString) {
            const apps = JSON.parse(jsonString);
            const list = document.getElementById('appList');
            list.innerHTML = '';
            let lastLetter = '';

            apps.sort((a, b) => a.name.localeCompare(b.name)).forEach(app => {
                const firstLetter = app.name[0].toUpperCase();
                if (firstLetter !== lastLetter && /^[A-Z]$/.test(firstLetter)) {
                    const header = document.createElement('li');
                    header.className = 'letter-header';
                    header.id = 'letter-' + firstLetter;
                    header.innerText = firstLetter;
                    list.appendChild(header);
                    lastLetter = firstLetter;
                }
                const li = document.createElement('li');
                li.className = 'app-item';
                li.innerText = app.name;
                li.onclick = () => AndroidBridge.launchApp(app.packageName);
                list.appendChild(li);
            });
        };

        // Start-Abfrage
        setTimeout(() => { if (window.AndroidBridge) AndroidBridge.fetchApps(); }, 300);
    </script>
</body>
</html>
